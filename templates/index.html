<!DOCTYPE html>
<html>

<head>
<title>Language Translator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🌍 Language Translation Tool</h1>

<form method="POST">

<textarea name="text" placeholder="Enter text here..."></textarea>

<br><br>

<label>Source Language</label>

<br>

<select name="source">
<option value="auto">Auto Detect</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="te">Telugu</option>
<option value="ta">Tamil</option>
</select>

<br><br>

<label>Target Language</label>

<br>

<select name="target">
<option value="hi">Hindi</option>
<option value="te">Telugu</option>
<option value="ta">Tamil</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="es">Spanish</option>
<option value="it">Italian</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="zh-cn">Chinese</option>
</select>

<br><br>

<button type="submit">Translate</button>
<button type="reset">Clear</button>

</form>

<h2>Translated Text:</h2>

{% if translated %}

<p id="translatedText">{{ translated }}</p>

<button onclick="copyText()">Copy Translation</button>

{% endif %}

</div>

<script>

function copyText() {
let text = document.getElementById("translatedText").innerText;
navigator.clipboard.writeText(text);
alert("Copied to clipboard!");
}

</script>

</body>

</html>
